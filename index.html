<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Archive | Connection Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #fff5f5; }
        .heart-beat { animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="font-sans text-gray-800">

    <main class="container mx-auto px-4 py-10 max-w-2xl">
        
        <div class="text-center mb-12">
            <div class="heart-beat text-rose-500 text-5xl mb-4"><i class="fas fa-heart"></i></div>
            <h1 class="text-3xl font-bold text-gray-900">The Connection Archive</h1>
            <p class="text-rose-400 font-medium mt-2" id="dayCounter">Counting the moments...</p>
        </div>

        <section class="bg-white rounded-3xl shadow-xl shadow-rose-100 p-8 mb-8 border border-rose-50">
            <h2 class="text-xl font-bold mb-6 flex items-center">
                <i class="fas fa-flag-checkered mr-3 text-rose-400"></i> Significant Milestones
            </h2>
            <div class="space-y-6 border-l-2 border-rose-100 ml-3">
                <div class="relative pl-8">
                    <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-rose-400"></div>
                    <p class="text-sm text-gray-400 uppercase font-bold">The Beginning</p>
                    <p class="text-gray-700">The day we first started talking.</p>
                </div>
                <div class="relative pl-8">
                    <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-rose-200"></div>
                    <p class="text-sm text-gray-400 uppercase font-bold">The Question</p>
                    <p class="text-gray-700">When we decided to make things official.</p>
                </div>
            </div>
        </section>

        <section class="bg-rose-500 rounded-3xl p-8 text-white shadow-lg shadow-rose-200">
            <h2 class="text-xl font-bold mb-4">Deep Talk Engine</h2>
            <p class="text-rose-100 text-sm mb-6">Need something to talk about? Pull a prompt to strengthen the bond.</p>
            <div id="promptBox" class="bg-white/10 p-6 rounded-2xl border border-white/20 min-h-[100px] flex items-center justify-center text-center italic text-lg mb-6">
                Click the button to start...
            </div>
            <button onclick="generatePrompt()" class="w-full bg-white text-rose-600 font-bold py-4 rounded-2xl hover:bg-rose-50 transition-colors">
                New Prompt
            </button>
        </section>

    </main>

    <script src="archive.js"></script>
</body>
</html
